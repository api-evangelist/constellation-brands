description: Constellation Brands publishes a partner-oriented developer portal at dev.cbrands.com providing
  product, brand, and digital-asset APIs (bottle shots, tasting notes, hot sheets, shelf talkers, neck
  hangers, recipes, items product API) to distributors, retailers, and on-premise partners. There is
  no public pricing surface; access is granted by API key after partner registration and approval.
notes: Constellation Brands distributes its API under a partner / approved-key model. No public per-call
  or per-tier pricing is published; consumers should reach api.support@cbrands.com for an approved key.
sources:
  - https://dev.cbrands.com
plans:
  - id: constellation-brands-partner
    name: Approved Partner Access
    type: enterprise
    description: API access granted via approved registration and API key. Distribution is to authorized
      distributors, retailers, and on-premise trade partners.
    entries:
      - label: Partner API Access
        description: Access via approved API key; no published per-call pricing
        name: api_access
        type: subscription
        metric: varies
        limit: 'see Constellation Brands partner agreement'
        timeFrame: year
        geo: US
        unit: 1
        price: 'see Constellation Brands partner agreement'
        userMultiplied: false
    elements:
      - name: Bottle Shots API
      - name: Tasting Notes / Hot Sheets / Shelf Talkers / Neck Hangers / Recipes
      - name: Items Product API
