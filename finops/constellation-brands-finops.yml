  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Constellation Brands
providerId: constellation-brands
publisherName: Constellation Brands, Inc.
serviceCategory: Beverages / Product Data API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Beverages
  - Digital Assets
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Constellation Brands: partner-distributed product / digital-asset
  API; access is governed by the partner agreement rather than per-call billing. FinOps applies to internal
  attribution of partner-API consumption and to commercial counterparty spend, not to a metered API
  bill.'
notes: Constellation Brands does not publish per-call API pricing. This artifact tracks internal-only
  meters useful for chargeback within consuming organizations.
sources:
  - https://dev.cbrands.com
billingModel:
  pricingCategory: Partner-Bundled
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Constellation Brands API
  ServiceCategory: Beverages / Product Data API
  ProviderName: Constellation Brands
  PublisherName: Constellation Brands, Inc.
  InvoiceIssuerName: Constellation Brands, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: api_calls_internal
    description: Internal-only meter — count of API calls per consuming application for chargeback within
      the partner organization. Not billed externally by Constellation Brands.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - consumer_app
      - environment
  - name: digital_asset_downloads
    description: Bottle shot / digital-asset downloads served from the partner API
    unit: download
    aggregation: sum
    dimensions:
      - asset_type
      - brand
principles:
  - name: Visibility
    description: Track API key usage internally; coordinate with api.support@cbrands.com for partner-side
      usage reports under the partner agreement.
  - name: Allocation
    description: Allocate by consuming product / brand integration via API-key segmentation.
  - name: Optimization
    description: Cache product metadata and bottle-shot assets; pull deltas via the items product API
      rather than full refresh; right-size partner agreement scope at renewal.
  - name: Accountability
    description: Trade-marketing / partner-integration teams own consumption against the partner agreement.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
