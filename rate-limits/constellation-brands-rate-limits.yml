specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Constellation Brands
providerId: constellation-brands
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Beverages
  - Digital Assets
  - Rate Limiting
description: Constellation Brands does not publish public rate-limit numbers for the dev.cbrands.com
  partner API. Throttling and quota policy are governed per partner / API-key agreement.
notes: No public RPS/RPM thresholds for the cbrands API. Reconcile via the partner onboarding process
  (api.support@cbrands.com).
sources:
  - https://dev.cbrands.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-API-Key Throttling
    scope: api-key
    metric: varies
    limit: 'see partner agreement'
    notes: Per-key limits are negotiated through partner onboarding; not publicly published.
policies:
  - name: API-Key Authentication
    description: All access requires an approved API key issued through Constellation Brands' developer
      registration process.
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429 / 503 responses.
  - name: Approved Use
    description: API distribution is limited to approved distributors, retailers, and on-premise partners
      under the partner agreement.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
